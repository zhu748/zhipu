server:
  port: 8080
  # Host to bind the proxy on.
  #   "0.0.0.0" = bind on ALL interfaces (LAN/remote clients can connect)
  #   "127.0.0.1" = bind on localhost ONLY (no remote access)
  # NOTE: even when bound to 0.0.0.0, you must access the dashboard via
  #   http://127.0.0.1:8080/admin (or your machine's LAN IP) — opening
  #   http://0.0.0.0:8080/admin directly does NOT work on Windows / macOS.
  host: "0.0.0.0"

  # Whether to trust X-Forwarded-For / X-Real-IP headers for client IP
  # detection (used by the admin dashboard loopback gate when proxyApiKey
  # is NOT configured).
  #   false (default) = client IP read from the TCP socket (un-spoofable)
  #   true             = trust XFF/X-Real-IP (set ONLY when behind a trusted
  #                      reverse proxy like nginx/Caddy that overwrites them)
  trustProxy: false

  # Upstream request timeout in milliseconds. Applied to BOTH stream and
  # batch requests. Set to 0 (or omit) to use the defaults:
  #   - stream requests: 10 minutes (600000 ms)
  #   - batch requests:  5 minutes (300000 ms)
  # Lower this if your network is fast and you want faster failure detection;
  # raise it if you regularly run very long reasoning chains that exceed 10 min.
  upstreamTimeoutMs: 0

auth:
  # "apikey" = use a pre-obtained API key directly
  # "oauth"  = use OAuth login flow (run `zcode-proxy auth login <zai|bigmodel>` first)
  mode: apikey

  # For apikey mode:
  #   Z.AI:     "yourApiKey.yourSecretKey"
  #   Bigmodel: "yourApiKey"
  apiKey: "YOUR_API_KEY_HERE"

  # Key that clients must provide to use the proxy.
  # Set to null/omit to disable client auth.
  proxyApiKey: "your-proxy-secret"

  # For oauth mode (path to stored credentials from login flow):
  # oauthCredentialsPath: "~/.zcode-proxy/credentials.json"

# Which upstream provider to use: "zai" or "bigmodel"
provider: zai

# Which plan tier to use:
#   "coding-plan" (default) — direct upstream endpoints, permanent API key
#   "start-plan"            — routes through zcode.z.ai with JWT auth (requires `auth login`)
plan: coding-plan

providers:
  zai:
    anthropicBase: "https://api.z.ai/api/anthropic"
    openaiBase: "https://api.z.ai/api/coding/paas/v4"
  bigmodel:
    anthropicBase: "https://open.bigmodel.cn/api/anthropic"
    openaiBase: "https://open.bigmodel.cn/api/coding/paas/v4"

defaultModel: glm-4.6

models:
  - glm-4.5-air
  - glm-4.6
  - glm-4.6v
  - glm-4.7
  - glm-5
  - glm-5-turbo
  - glm-5v-turbo
  - glm-5.1
  - glm-5.2

# Identity headers injected on every upstream request to mimic the ZCode
# desktop client (User-Agent, X-ZCode-App-Version, X-Title, X-ZCode-Agent,
# HTTP-Referer). All optional; env vars override YAML, which overrides defaults.
identity:
  # Mirrors process.env.ZCODE_APP_VERSION in the ZCode bundle.
  # Must be printable ASCII; non-conforming values fall back to the default.
  # Default: "3.1.5" (current ZCode release). Override to match your real client.
  appVersion: "3.1.5"
  # X-Title suffix → "Z Code@{sourceTitle}". Default "cli".
  sourceTitle: "cli"
  # HTTP-Referer URL. Default "https://zcode.z.ai".
  refererOrigin: "https://zcode.z.ai"

logging:
  level: info
  # Verbose mode (vceshi0.0.6+): logs the full upstream request headers +
  # transformed body for every request. Useful for diagnosing 3001 parameter
  # errors. Env var: ZCODE_PROXY_VERBOSE_LOGGING=1
  # verbose: false
  # Debug response logging (ceshi0.1.4+): logs the FULL upstream response
  # for every request — status + key headers + body preview (first 1000 chars
  # for JSON, first 2KB for SSE streams). Shows EXACTLY what 529 / empty 200 /
  # captcha 403 returned, including the error JSON body. Uses resp.clone() so
  # it doesn't consume the original response. Env var: ZCODE_PROXY_DEBUG_LOGGING=1
  # debug: false

# Retry configuration for upstream requests.
# When the upstream returns a retryable status code (e.g. 529 site overloaded),
# the proxy will automatically retry with exponential backoff.
# All fields are optional; defaults are shown below.
# Environment variable overrides:
#   ZCODE_RETRY_MAX                        — max number of retries
#   ZCODE_RETRY_INITIAL_DELAY_MS           — initial delay before first retry (ms)
#   ZCODE_RETRY_MAX_DELAY_MS               — maximum delay cap (ms)
#   ZCODE_RETRY_BACKOFF_FACTOR             — backoff multiplier per attempt
#   ZCODE_RETRY_STATUSES                   — comma-separated retryable status codes (e.g. "529,429,503")
#   ZCODE_RETRY_CREDENTIAL_SWITCH_THRESHOLD — consecutive failures before switching credentials
retry:
  # Maximum number of retry attempts. Set to 0 to disable retries entirely.
  # No upper bound — set as high as needed (e.g. 1000 for very flaky upstreams).
  maxRetries: 3
  # Initial delay (ms) before the first retry. Subsequent retries multiply by backoffFactor.
  initialDelayMs: 1000
  # Maximum delay cap (ms). Backoff will never exceed this value.
  maxDelayMs: 8000
  # Exponential backoff multiplier. 2 = each retry waits ~2x longer.
  backoffFactor: 2
  # HTTP status codes that trigger a retry.
  # Common values: 429 (rate limited), 503 (service unavailable), 529 (site overloaded).
  retryableStatuses:
    - 529
  # Credential auto-switching: when the SAME credential fails this many times
  # consecutively (including the initial request), the proxy automatically
  # switches to another stored credential (if available) and continues retrying.
  # Already-tried credentials are skipped in the same request to avoid cycling.
  #
  # Set to 0 to disable. Default: 2 (v0.1.5+; was 5 — but 5 > maxRetries=3
  # made the feature a no-op under default config).
  #
  # Only effective when:
  #   1. More than one credential is stored (add accounts via the dashboard or
  #      `zcode-proxy auth login`).
  #   2. maxRetries >= this threshold (otherwise the retry loop exhausts first).
  credentialSwitchThreshold: 2

# --- Responses thinking override (Codex CLI workaround) ---
# Codex CLI frequently sends `reasoning: null` in the /v1/responses wire
# payload (the CLI only populates it when an explicit effort level is forced
# via local config), so the translator's "honor reasoning.effort" branch
# never fires and the upstream GLM request goes out without `thinking`.
#
# This section lets the operator force-enable thinking for specific models
# regardless of what the client sent. Matching is case-insensitive exact
# match on the *post-mapping* request model (i.e. the final GLM model id
# after modelMappings is applied).
#
# Empty array / omitted = disabled (default). Two equivalent shapes:
#
#   responsesThinking:
#     models:
#       - glm-5.2
#       - glm-4.6
#
#   # or shorthand:
#   responsesThinking:
#     - glm-5.2
#     - glm-4.6
#
# The dashboard also exposes this as a chip-style multi-select under
# 代理规则 → Responses 思考管理.
responsesThinking:
  models: []

# --- Anthropic format options ---
anthropic:
  # Force-enable streaming for Anthropic /v1/messages requests.
  # When true, the proxy overrides the client's stream preference (including
  # stream:false or missing stream field) to stream:true before forwarding
  # upstream. This gives real-time token-by-token output instead of waiting
  # for the full batch response.
  # Only affects the Anthropic passthrough path; OpenAI/Responses formats are
  # unaffected (they already default to streaming in most clients).
  # Default: false. Env var: ZCODE_PROXY_FORCE_STREAM_ANTHROPIC=1
  forceStream: false
  # Align request body structure to match the real ZCode desktop client exactly.
  # When true:
  #   1. Top-level field order: model → max_tokens → thinking → output_config
  #      → system → messages → tools → tool_choice → stream
  #   2. Inject 3 ZCode official system blocks (both coding-plan AND start-plan),
  #      client's original system appended after
  #   3. Rewrite "You are Claude Code, Anthropic's official CLI for Claude."
  #      → "You are ZCode model working in Claude Code."
  #   4. Keep role: "system" inside messages[] (don't relocate to top-level system)
  # Default: false. Env var: ZCODE_PROXY_ALIGN_ZCODE_FORMAT=1
  alignZCodeFormat: false
# NOTE: ZCode thinking-format injection (max_tokens=64000 + budget_tokens=32000
# + output_config.effort=max) is now UNCONDITIONAL default behavior since v0.1.9.
# Any Anthropic request with thinking.type === "enabled" automatically gets
# these fields rewritten to match the real ZCode desktop client. No config
# needed — this aligns our request body fingerprint with the real client at
# the WAF body-inspection layer.
